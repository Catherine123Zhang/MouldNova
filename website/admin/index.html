<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MouldNova CRM — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .auth-card {
      background: #fff; border-radius: 12px; padding: 40px;
      width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .auth-card h1 { font-size: 1.4rem; margin-bottom: 4px; color: #A52030; }
    .auth-card p  { font-size: .875rem; color: #64748b; margin-bottom: 28px; }
    .auth-card label { display: block; font-size: .8rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .auth-card input {
      width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: .9rem; margin-bottom: 16px; outline: none;
      transition: border-color .2s;
    }
    .auth-card input:focus { border-color: #A52030; }
    .btn-login {
      width: 100%; background: #A52030; color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-login:hover { background: #8b1a28; }
    .auth-error { color: #dc2626; font-size: .85rem; margin-top: 12px; }

    /* ── App shell ── */
    #app { display: none; }
    header {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 56px;
    }
    .header-brand { font-size: 1rem; font-weight: 700; color: #A52030; }
    .header-brand span { font-weight: 400; color: #64748b; font-size: .85rem; margin-left: 8px; }
    .btn-logout {
      background: none; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: 6px 14px; font-size: .8rem; cursor: pointer; color: #475569;
      transition: background .2s;
    }
    .btn-logout:hover { background: #f8fafc; }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; gap: 12px; align-items: center;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .toolbar select, .toolbar input[type="text"] {
      padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px;
      font-size: .875rem; outline: none; background: #fff;
      transition: border-color .2s;
    }
    .toolbar select:focus, .toolbar input[type="text"]:focus { border-color: #A52030; }
    .toolbar input[type="text"] { min-width: 220px; }
    .btn-refresh {
      background: #fff; border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 8px 14px; font-size: .875rem; cursor: pointer;
      transition: background .2s;
    }
    .btn-refresh:hover { background: #f8fafc; }
    .toolbar-count { font-size: .85rem; color: #64748b; margin-left: auto; }

    /* ── Table ── */
    .table-wrap {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      text-align: left; padding: 12px 16px; font-size: .75rem;
      font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr.clickable:hover { background: #f8fafc; cursor: pointer; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: .75rem; font-weight: 600; text-transform: capitalize;
    }
    .badge--new       { background: #dbeafe; color: #1d4ed8; }
    .badge--contacted { background: #fef9c3; color: #854d0e; }
    .badge--quoted    { background: #ede9fe; color: #5b21b6; }
    .badge--won       { background: #dcfce7; color: #15803d; }
    .badge--lost      { background: #fee2e2; color: #b91c1c; }

    /* ── Side panel ── */
    #panel-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.35); z-index: 100;
    }
    #side-panel {
      position: fixed; top: 0; right: -480px; width: 460px; max-width: 100vw;
      height: 100vh; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,.12);
      z-index: 101; transition: right .3s ease; overflow-y: auto; padding: 28px;
    }
    #side-panel.open { right: 0; }
    .panel-close {
      position: absolute; top: 16px; right: 20px; background: none; border: none;
      font-size: 1.4rem; cursor: pointer; color: #64748b; line-height: 1;
    }
    .panel-close:hover { color: #1e293b; }
    .panel-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; padding-right: 28px; }
    .panel-field { margin-bottom: 14px; }
    .panel-field label { display: block; font-size: .75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .panel-field .val { font-size: .9rem; word-break: break-word; }
    .panel-field .val a { color: #A52030; }
    .panel-divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
    .panel-field select, .panel-field textarea {
      width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: .875rem; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    .panel-field select:focus, .panel-field textarea:focus { border-color: #A52030; }
    .panel-field textarea { resize: vertical; min-height: 80px; }
    .btn-save {
      width: 100%; background: #A52030; color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-size: .95rem; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background .2s;
    }
    .btn-save:hover { background: #8b1a28; }
    .btn-save:disabled { background: #94a3b8; cursor: default; }
    .save-msg { font-size: .8rem; text-align: center; margin-top: 8px; }

    .empty-state { padding: 60px 20px; text-align: center; color: #94a3b8; }

    @media (max-width: 640px) {
      #side-panel { width: 100vw; }
      .toolbar-count { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>MouldNova CRM</h1>
    <p>Sign in to manage RFQ leads</p>
    <label for="auth-email">Email</label>
    <input type="email" id="auth-email" placeholder="you@example.com" />
    <label for="auth-password">Password</label>
    <input type="password" id="auth-password" placeholder="••••••••" />
    <button class="btn-login" id="btn-login">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-brand">MouldNova CRM <span>RFQ Leads</span></div>
    <button class="btn-logout" id="btn-logout">Sign Out</button>
  </header>
  <main>
    <div class="toolbar">
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="quoted">Quoted</option>
        <option value="won">Won</option>
        <option value="lost">Lost</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search name, email, company…" />
      <button class="btn-refresh" id="btn-refresh">↺ Refresh</button>
      <span class="toolbar-count" id="result-count"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Company</th>
            <th>Email</th>
            <th>Country</th>
            <th>Source</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <tr><td colspan="7" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Side panel overlay -->
<div id="panel-overlay"></div>

<!-- Side panel -->
<div id="side-panel">
  <button class="panel-close" id="panel-close" aria-label="Close">×</button>
  <div class="panel-title" id="panel-title">Lead Details</div>

  <div class="panel-field"><label>Name</label><div class="val" id="p-name">—</div></div>
  <div class="panel-field"><label>Company</label><div class="val" id="p-company">—</div></div>
  <div class="panel-field"><label>Email</label><div class="val" id="p-email">—</div></div>
  <div class="panel-field"><label>Phone / WhatsApp</label><div class="val" id="p-phone">—</div></div>
  <div class="panel-field"><label>Country</label><div class="val" id="p-country">—</div></div>
  <div class="panel-field"><label>Source</label><div class="val" id="p-source">—</div></div>
  <div class="panel-field"><label>Service</label><div class="val" id="p-service">—</div></div>
  <div class="panel-field"><label>Date</label><div class="val" id="p-date">—</div></div>
  <div class="panel-field" id="p-meta-wrap" style="display:none">
    <label>Extra Fields</label><div class="val" id="p-meta">—</div>
  </div>
  <div class="panel-field"><label>Message</label><div class="val" id="p-message" style="white-space:pre-wrap">—</div></div>

  <hr class="panel-divider" />

  <div class="panel-field">
    <label for="p-status-sel">Status</label>
    <select id="p-status-sel">
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="quoted">Quoted</option>
      <option value="won">Won</option>
      <option value="lost">Lost</option>
    </select>
  </div>
  <div class="panel-field">
    <label for="p-notes">Notes</label>
    <textarea id="p-notes" placeholder="Internal notes…"></textarea>
  </div>
  <button class="btn-save" id="btn-save">Save Changes</button>
  <div class="save-msg" id="save-msg"></div>
</div>

<script>
const SUPABASE_URL  = 'https://eqsxfvzwvfqyufwsvpua.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxc3hmdnp3dmZxeXVmd3N2cHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5MjcwOTIsImV4cCI6MjA4MzUwMzA5Mn0.UdkLEbuJ-uI0ekPc82rjDP7thyX20xPXlfidSre1N8c';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── State ──────────────────────────────────────────────────────────────────
let allLeads = [];
let currentId = null;

// ── Auth ───────────────────────────────────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp();
}

document.getElementById('btn-login').addEventListener('click', async () => {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = error.message; return; }
  showApp();
});

document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
});

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadLeads();
}

// ── Data ───────────────────────────────────────────────────────────────────
async function loadLeads() {
  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Loading…</td></tr>';

  const { data, error } = await sb
    .from('rfq_submissions')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-state" style="color:#dc2626">Error: ${error.message}</td></tr>`;
    return;
  }

  allLeads = data || [];
  renderTable();
}

function renderTable() {
  const status = document.getElementById('filter-status').value;
  const search = document.getElementById('filter-search').value.toLowerCase();

  const filtered = allLeads.filter(r => {
    if (status && r.status !== status) return false;
    if (search) {
      const hay = [r.name, r.email, r.company, r.country, r.form_source].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('result-count').textContent = `${filtered.length} lead${filtered.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('leads-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No leads found</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => `
    <tr class="clickable" data-id="${r.id}">
      <td>${fmtDate(r.created_at)}</td>
      <td>${esc(r.name || '—')}</td>
      <td>${esc(r.company || '—')}</td>
      <td>${esc(r.email)}</td>
      <td>${esc(r.country || '—')}</td>
      <td style="font-size:.8rem;color:#64748b">${esc(r.form_source || '—')}</td>
      <td><span class="badge badge--${r.status}">${r.status}</span></td>
    </tr>
  `).join('');

  tbody.querySelectorAll('tr[data-id]').forEach(row => {
    row.addEventListener('click', () => openPanel(row.dataset.id));
  });
}

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel(id) {
  const r = allLeads.find(x => x.id === id);
  if (!r) return;
  currentId = id;

  document.getElementById('panel-title').textContent = r.name || r.email;
  document.getElementById('p-name').textContent     = r.name    || '—';
  document.getElementById('p-company').textContent  = r.company || '—';
  document.getElementById('p-email').innerHTML      = r.email ? `<a href="mailto:${esc(r.email)}">${esc(r.email)}</a>` : '—';
  document.getElementById('p-phone').textContent    = r.phone   || '—';
  document.getElementById('p-country').textContent  = r.country || '—';
  document.getElementById('p-source').textContent   = r.form_source || '—';
  document.getElementById('p-service').textContent  = r.service  || '—';
  document.getElementById('p-date').textContent     = fmtDateLong(r.created_at);
  document.getElementById('p-message').textContent  = r.message  || '—';

  const metaWrap = document.getElementById('p-meta-wrap');
  if (r.metadata && Object.keys(r.metadata).length) {
    metaWrap.style.display = 'block';
    document.getElementById('p-meta').textContent =
      Object.entries(r.metadata).map(([k,v]) => `${k}: ${v}`).join('\n');
  } else {
    metaWrap.style.display = 'none';
  }

  document.getElementById('p-status-sel').value = r.status || 'new';
  document.getElementById('p-notes').value       = r.notes  || '';
  document.getElementById('save-msg').textContent = '';
  document.getElementById('btn-save').disabled   = false;

  document.getElementById('side-panel').classList.add('open');
  document.getElementById('panel-overlay').style.display = 'block';
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('panel-overlay').style.display = 'none';
  currentId = null;
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('panel-overlay').addEventListener('click', closePanel);

// ── Save ───────────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  if (!currentId) return;
  const btn  = document.getElementById('btn-save');
  const msg  = document.getElementById('save-msg');
  const newStatus = document.getElementById('p-status-sel').value;
  const newNotes  = document.getElementById('p-notes').value;

  btn.disabled   = true;
  btn.textContent = 'Saving…';
  msg.textContent = '';

  const { error } = await sb
    .from('rfq_submissions')
    .update({ status: newStatus, notes: newNotes, updated_at: new Date().toISOString() })
    .eq('id', currentId);

  if (error) {
    msg.style.color = '#dc2626';
    msg.textContent = 'Error: ' + error.message;
  } else {
    msg.style.color = '#15803d';
    msg.textContent = 'Saved!';
    // Update local cache
    const idx = allLeads.findIndex(x => x.id === currentId);
    if (idx !== -1) {
      allLeads[idx].status = newStatus;
      allLeads[idx].notes  = newNotes;
    }
    renderTable();
  }

  btn.disabled   = false;
  btn.textContent = 'Save Changes';
});

// ── Filters ────────────────────────────────────────────────────────────────
document.getElementById('filter-status').addEventListener('change', renderTable);
document.getElementById('filter-search').addEventListener('input',  renderTable);
document.getElementById('btn-refresh').addEventListener('click', loadLeads);

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function fmtDateLong(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB', {
    day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
checkSession();
</script>
</body>
</html>
